<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Membership Registration Form</title>
    <link rel="stylesheet" href="Stylee.css">
</head>
<body>

    <h1>Library Membership Registration Form</h1>

    <form action="#" method="post">
        
        <fieldset>
            <legend>Personal Information</legend>
            
            <label for="fname">Full Name:</label>
            <input type="text" name="fname" id="fname" required>
            
            <br><br>
            
            <label for="mid">Membership ID:</label>
            <input type="text" name="mid" id="mid" required>
            
            <br><br>
            
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" required>
            
            <br><br>
            
            <label for="phone">Phone Number:</label>
            <input type="tel" name="phone" id="phone" required>
            
            <br><br>
            
            <label for="DoB">Date of Birth:</label>
            <input type="date" name="DoB" id="DoB" required>
            
            <br><br>
            
            <label>Gender:</label><br>
            <input type="radio" name="gender" id="male" value="Male">
            <label for="male">Male</label>
            
            <input type="radio" name="gender" id="female" value="Female">
            <label for="female">Female</label>
            
            <input type="radio" name="gender" id="other" value="Other">
            <label for="other">Other</label>
        </fieldset>

        <fieldset>
            <legend>Membership Information</legend>
            
            <label for="mtype">Membership Type:</label>
            <select name="mtype" id="mtype">
                <option value="">Select Type</option>  
                <option value="student">Student</option>  
                <option value="faculty">Faculty</option>  
                <option value="researcher">Researcher</option>
                <option value="general member">General Member</option>
            </select>
            
            <br><br>
            
            <label for="libsec">Library Section:</label>
            <select name="libsec" id="libsec">
                <option value="">Select Section</option>  
                <option value="scienceandtechnology">Science and Technology</option>  
                <option value="literature">Literature</option>  
                <option value="businesstudies">Business Studies</option>
                <option value="history">History</option>
                <option value="artsandculture">Arts and Culture</option>
            </select>
            
            <br><br>
            
            <label>Reading Preferences:</label><br>
            <input type="checkbox" name="reading_prefs[]" id="fiction" value="Fiction">
            <label for="fiction">Fiction</label>
            
            <input type="checkbox" name="reading_prefs[]" id="nonfiction" value="Non-Fiction">
            <label for="nonfiction">Non-Fiction</label>
            
            <input type="checkbox" name="reading_prefs[]" id="science" value="Science">
            <label for="science">Science</label>
            
            <input type="checkbox" name="reading_prefs[]" id="technology" value="Technology">
            <label for="technology">Technology</label>
            
            <input type="checkbox" name="reading_prefs[]" id="biography" value="Biography">
            <label for="biography">Biography</label>
            
            <input type="checkbox" name="reading_prefs[]" id="history_pref" value="History">
            <label for="history_pref">History</label>
            
            <br><br>

            <label>Library Services:</label><br>
            <input type="checkbox" name="library_services[]" id="book_borrowing" value="Book Borrowing">
            <label for="book_borrowing">Book Borrowing</label>
            
            <input type="checkbox" name="library_services[]" id="digital_access" value="Digital Library Access">
            <label for="digital_access">Digital Library Access</label>
            
            <input type="checkbox" name="library_services[]" id="reading_room" value="Reading Room">
            <label for="reading_room">Reading Room</label>
            
            <input type="checkbox" name="library_services[]" id="research_assistance" value="Research Assistance">
            <label for="research_assistance">Research Assistance</label>
            
            <br><br>

            <label for="curradd">Current Address:</label>
            <input type="text" name="curradd" id="curradd" required>
            
            <br><br>
            
            <label for="emnum">Emergency Contact Number:</label>
            <input type="text" name="emnum" id="emnum" required>
            
            <br><br>
            
            <label for="join">Reason for Joining:</label>
            <input type="text" name="join" id="join" required>
            
            <br><br>
            
            <label for="suggession">Suggestion for Library Improvement:</label>
            <input type="text" name="suggession" id="suggession" required>
            
            <br><br>
            
            <div class="button-container">
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
            </div>

        </fieldset>

    </form>
</body>
</html>
