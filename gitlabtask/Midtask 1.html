<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Library Membership Registration Form</h1>
    <form action="#" method="post">
        <fieldset>
            <legend>Personal Information</legend>
            <label for="fname">Full Name:</label>
            <input type="text" name="fname" id="fname" required>
            <br/> <br/>
            <label for="mid">Membership ID:</label>
            <input type="text" name="mid" id="mid" required>
            <br/> <br/>
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" required>
            <br/> <br/>
            <label for="phone">Phone Number:</label>
            <input type="tel" name="phone" id="phone" required>
            <br/> <br/>
            <label for="DoB">Date of Birth:</label>
            <input type="date" name="DoB" id="DoB" required>
            <br/> <br/>
            <label for="gender">Gender:</label>
            <input type="radio" name="gender" id="male" value="Male">
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female" value="Female">
            <label for="male">Female</label>
            <input type="radio" name="gender" id="other" value="Other">
            <label for="other">Other</label>
            <br/> <br/>

        </fieldset>

        <fieldset>
            <legend>Membership Information</legend>
            <label for="mtype">Membership Type</label>
            <select name="mtype" id="mtype">
                <option value="">Select Type</option>  
                <option value="student">Student</option>  
                <option value="faculty">Faculty</option>  
                <option value="researcher">Researcher</option>
                <option value="general member">General Member</option>
            </select>
            <br/> <br/>
            <label for="libsec">Library Section</label>
            <select name="libsec" id="libsec">
                <option value="">Select Section</option>  
                <option value="scienceandtechnology">Science and Technology</option>  
                <option value="literature">Literature</option>  
                <option value="businesstudies">Business Studies</option>
                <option value="history">History</option>
                <option value="artsandculture">Arts and Culture</option>
            </select>
            <br/> <br/>
             <lebel for="Reading Preferences">Reading Preferences</lebel>
            <input type="checkbox" name="Reading Preferences" id="fiction" value="Fiction">
            <label for="fiction">Fiction</label>
            <input type="checkbox" name="Reading Preferences" id="nonfiction" value="Non-Fiction">
            <label for="nonfiction">Non-Fiction</label>
            <input type="checkbox" name="Reading Preferences" id="Science" value="Science">
            <label for="Science">Science</label>
            <input type="checkbox" name="Reading Preferences" id="Technology" value="Technology">
            <label for="Technology">Technology</label>
            <input type="checkbox" name="Reading Preferences" id="Biography" value="Biography">
            <label for="Biography">Biography</label>
            <input type="checkbox" name="Reading Preferences" id="History" value="History">
            <label for="History">History</label>
            <br/> <br/>

            <lebel for="Library Services">Library Services</lebel>
            <input type="checkbox" name="Library Services" id="Book Borrowing" value="Book Borrowing">
            <label for="Book Borrowing">Book Borrowing</label>
            <input type="checkbox" name="Library Services" id="Digital Library Access" value="Digital Library Access">
            <label for="Digital Library Access">Digital Library Access</label>
            <input type="checkbox" name="Library Services" id="Reading Room" value="Reading Room">
            <label for="Reading Room">Reading Room</label>
            <input type="checkbox" name="Library Services" id="Research Assistance" value="Research Assistance">
            <label for="Research Assistance">Research Assistance</label>
            <br/> <br/>

            <label for="addinfo">Additional Information:</label><br/>
             <label for="curradd">Current Address:</label>
            <input type="text" name="curradd" id="curradd" required>
            <br/> <br/>
            <label for="emnum">Emergency Contact Number:</label><br/>
             <label for="emnum">Emergency Contact Number:</label>
            <input type="text" name="emnum" id="emnum" required>
            <br/> <br/>
           
             <label for="join">Reason for Joining:</label>
            <input type="text" name="join" id="join" required>
            <br/> <br/>
           
             <label for="suggession">Suggession for library improvement:</label>
            <input type="text" name="suggession" id="suggession" required>
            <br/> <br/>
           
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
 

            

        </fieldset>

                

    </form>
</body>
</html>
